<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — akn.id</title>
<link rel="icon" href="https://akn.me.uk/favicon.ico">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0c0c14; --text: rgba(255,255,255,0.85); --text-muted: rgba(255,255,255,0.32);
  --card-bg: rgba(255,255,255,0.04); --card-border: rgba(255,255,255,0.08);
  --input-bg: rgba(255,255,255,0.05); --input-border: rgba(255,255,255,0.1);
  --input-focus: rgba(167,139,250,0.45); --btn-bg: rgba(167,139,250,0.15);
  --btn-color: #a78bfa; --btn-border: rgba(167,139,250,0.3);
}
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--card-border); }
.wordmark { display: flex; align-items: center; gap: 9px; text-decoration: none; }
.wordmark img { width: 20px; height: 20px; opacity: 0.5; filter: invert(1); }
.wordmark span { font-size: 13px; color: var(--text-muted); letter-spacing: 0.05em; }
.topbar-right { display: flex; gap: 16px; align-items: center; font-size: 12px; color: var(--text-muted); }
.topbar-right a { color: var(--btn-color); text-decoration: none; }
.page { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }
h1 { font-size: 1.2rem; font-weight: 500; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 36px; }
.tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid var(--card-border); }
.tab { padding: 8px 16px; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; transition: color 0.2s; }
.tab.active { color: var(--btn-color); border-bottom-color: var(--btn-color); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.section-title { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
.person-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--card-border); flex-wrap: wrap; cursor: pointer; transition: background 0.15s; }
.person-row:last-child { border-bottom: none; }
.person-row:hover { background: rgba(255,255,255,0.02); }
.person-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--btn-bg); border: 1px solid var(--btn-border); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--btn-color); flex-shrink: 0; overflow: hidden; }
.person-avatar img { width: 100%; height: 100%; object-fit: cover; }
.person-info { flex: 1; min-width: 0; }
.person-name { font-size: 13px; font-weight: 500; }
.person-email { font-size: 12px; color: var(--text-muted); }
.person-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
.badge-approved { background: rgba(110,231,183,0.12); color: #6ee7b7; border: 1px solid rgba(110,231,183,0.2); }
.badge-pending { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
.badge-rejected { background: rgba(252,165,165,0.1); color: #fca5a5; border: 1px solid rgba(252,165,165,0.2); }
.badge-admin { background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.2); }
.btn { background: var(--btn-bg); color: var(--btn-color); border: 1px solid var(--btn-border); border-radius: 7px; padding: 5px 12px; font-size: 12px; font-family: inherit; cursor: pointer; transition: background 0.2s; }
.btn:hover { background: rgba(167,139,250,0.25); }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-approve { background: rgba(110,231,183,0.1); color: #6ee7b7; border-color: rgba(110,231,183,0.25); }
.btn-approve:hover { background: rgba(110,231,183,0.18); }
.btn-reject { background: rgba(252,165,165,0.08); color: #fca5a5; border-color: rgba(252,165,165,0.2); }
.btn-reject:hover { background: rgba(252,165,165,0.15); }
.btn-danger { background: rgba(252,165,165,0.08); color: #fca5a5; border-color: rgba(252,165,165,0.2); font-size: 12px; }
.btn-danger:hover { background: rgba(252,165,165,0.15); }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; }
.empty { padding: 32px; text-align: center; font-size: 13px; color: var(--text-muted); }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; letter-spacing: 0.04em; }
input, select { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 9px; padding: 9px 12px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.2s; }
input:focus, select:focus { border-color: var(--input-focus); }
input::placeholder { color: var(--text-muted); }
.create-form { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; padding: 20px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
.msg { font-size: 12px; margin-top: 10px; min-height: 16px; }
.msg-ok { color: #6ee7b7; }
.msg-err { color: #fca5a5; }
.tag-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 9px; padding: 7px 10px; cursor: text; }
.tag-input-wrap:focus-within { border-color: var(--input-focus); }
.tag { display: flex; align-items: center; gap: 4px; background: var(--btn-bg); color: var(--btn-color); border: 1px solid var(--btn-border); border-radius: 20px; padding: 2px 8px; font-size: 12px; }
.tag button { background: none; border: none; color: inherit; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; opacity: 0.6; }
.tag-input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; font-family: inherit; min-width: 80px; flex: 1; padding: 2px 0; }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
@media (max-width: 500px) { .stat-grid { grid-template-columns: 1fr 1fr; } }
.stat-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px; }
.stat-num { font-size: 1.6rem; font-weight: 500; color: var(--btn-color); }
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
/* Modal */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
.overlay.open { display: flex; }
.modal { background: #13131f; border: 1px solid var(--card-border); border-radius: 18px; padding: 28px; width: 100%; max-width: 560px; }
.modal-title { font-size: 1rem; font-weight: 500; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; line-height: 1; }
.modal-close:hover { color: var(--text); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.identity-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--card-border); font-size: 12px; }
.identity-row:last-child { border-bottom: none; }
.identity-uid { font-family: monospace; font-size: 11px; color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
<div class="topbar">
  <a class="wordmark" href="https://akn.me.uk">
    <img src="https://akn.me.uk/android-chrome-192x192.png" alt="">
    <span>akn.id / admin</span>
  </a>
  <div class="topbar-right">
    <span id="admin-name"></span>
    <a href="/account">My Account</a>
    <button id="btn-signout" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;color:var(--text-muted)">Sign Out</button>
  </div>
</div>

<div class="page" id="page" style="display:none">
  <h1>People</h1>
  <div class="page-sub">Identity & access management</div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total People</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-pending">—</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-approved">—</div><div class="stat-label">Approved</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="people">All People</button>
    <button class="tab" data-tab="pending">Pending</button>
    <button class="tab" data-tab="create">Create Person</button>
  </div>

  <div class="tab-panel active" id="tab-people">
    <div class="card" id="people-list"><div class="empty">Loading…</div></div>
  </div>

  <div class="tab-panel" id="tab-pending">
    <div class="card" id="pending-list"><div class="empty">Loading…</div></div>
  </div>

  <div class="tab-panel" id="tab-create">
    <div class="create-form">
      <div class="section-title">Create Person</div>
      <div class="form-row">
        <div class="field"><label>Name *</label><input type="text" id="c-name" placeholder="Full name" /></div>
        <div class="field"><label>Email</label><input type="email" id="c-email" placeholder="person@example.com" /></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Status</label>
          <select id="c-status"><option value="pending">Pending</option><option value="approved">Approved</option></select>
        </div>
        <div class="field"><label>Role</label>
          <select id="c-role"><option value="user">User</option><option value="admin">Admin</option></select>
        </div>
      </div>
      <div class="field">
        <label>Projects</label>
        <div class="tag-input-wrap" id="c-projects-wrap">
          <input class="tag-input" id="c-projects-input" placeholder="Type project and press Enter" />
        </div>
      </div>
      <div class="field">
        <label>Groups</label>
        <div class="tag-input-wrap" id="c-groups-wrap">
          <input class="tag-input" id="c-groups-input" placeholder="friends, family…" />
        </div>
      </div>
      <button class="btn" id="btn-create-person" style="margin-top:8px">Create Person</button>
      <div class="msg" id="create-msg"></div>
    </div>
  </div>
</div>

<div class="empty" id="loading" style="padding:80px">Loading…</div>
<div class="empty" id="denied" style="display:none;padding:80px;color:#fca5a5">
  Access denied. <a href="/" style="color:var(--btn-color)">Sign in</a>
</div>

<!-- Edit Modal -->
<div class="overlay" id="edit-overlay">
  <div class="modal">
    <div class="modal-title">
      <span>Edit Person</span>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <input type="hidden" id="edit-personId" />
    <div class="form-row">
      <div class="field"><label>Name</label><input type="text" id="edit-name" /></div>
      <div class="field"><label>Email</label><input type="email" id="edit-email" /></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Status</label>
        <select id="edit-status">
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <div class="field"><label>Role</label>
        <select id="edit-role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Projects</label>
      <div class="tag-input-wrap" id="edit-projects-wrap">
        <input class="tag-input" id="edit-projects-input" placeholder="project-id…" />
      </div>
    </div>
    <div class="field">
      <label>Groups</label>
      <div class="tag-input-wrap" id="edit-groups-wrap">
        <input class="tag-input" id="edit-groups-input" placeholder="friends, family…" />
      </div>
    </div>
    <div class="field">
      <label>Tags</label>
      <div class="tag-input-wrap" id="edit-tags-wrap">
        <input class="tag-input" id="edit-tags-input" placeholder="tag…" />
      </div>
    </div>

    <!-- Linked identities -->
    <div style="margin-top:16px">
      <div class="section-title">Linked Identities</div>
      <div id="edit-identities"><div class="empty" style="padding:12px 0">Loading…</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <input type="text" id="link-uid" placeholder="Firebase UID to link" style="flex:1;min-width:160px" />
      <input type="text" id="link-provider" placeholder="provider (google.com)" style="width:150px" />
      <button class="btn" id="btn-link-identity" style="flex-shrink:0">Link UID</button>
    </div>
    <div class="msg" id="link-msg"></div>

    <div class="modal-footer">
      <button class="btn btn-danger" id="btn-modal-reject">Set Rejected</button>
      <button class="btn btn-approve" id="btn-modal-approve">Set Approved</button>
      <button class="btn" id="btn-modal-save">Save Changes</button>
    </div>
    <div class="msg" id="edit-msg"></div>
  </div>
</div>

<script>
const API = 'https://api.akn.me.uk';
let allPeople = [];

// Tags state
const tagState = {
  'c-projects': [], 'c-groups': [],
  'edit-projects': [], 'edit-groups': [], 'edit-tags': [],
};

function renderTagWrap(key) {
  const wrap = document.getElementById(`${key}-wrap`);
  const input = document.getElementById(`${key}-input`);
  wrap.querySelectorAll('.tag').forEach(t => t.remove());
  tagState[key].forEach((val, i) => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = `${escHtml(val)} <button type="button" data-i="${i}" data-key="${key}">×</button>`;
    wrap.insertBefore(tag, input);
  });
}

function initTagInput(key) {
  const input = document.getElementById(`${key}-input`);
  const wrap = document.getElementById(`${key}-wrap`);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = e.target.value.trim().replace(/,$/, '');
      if (val && !tagState[key].includes(val)) { tagState[key].push(val); renderTagWrap(key); }
      e.target.value = '';
    }
    if (e.key === 'Backspace' && !e.target.value && tagState[key].length) {
      tagState[key].pop(); renderTagWrap(key);
    }
  });
  wrap.addEventListener('click', e => {
    if (e.target.tagName === 'BUTTON' && e.target.dataset.key === key) {
      tagState[key].splice(+e.target.dataset.i, 1);
      renderTagWrap(key);
    }
    if (e.target === wrap) input.focus();
  });
  wrap.addEventListener('click', () => input.focus());
}

['c-projects','c-groups','edit-projects','edit-groups','edit-tags'].forEach(initTagInput);

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || res.statusText);
  return res.json();
}

// Auth check
async function init() {
  try {
    const session = await api('/auth/session/refresh', { method: 'POST' });
    if (!session.authenticated) throw new Error('not authenticated');
    if (session.role !== 'admin' && !session.projects?.includes('*')) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('denied').style.display = '';
      return;
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('page').style.display = '';
    document.getElementById('admin-name').textContent = session.name || session.email || '';
    await loadPeople();
  } catch {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('denied').style.display = '';
  }
}

async function loadPeople() {
  try {
    const { people } = await api('/auth/people');
    allPeople = people;
    const pending = people.filter(p => p.status === 'pending');
    const approved = people.filter(p => p.status === 'approved');
    document.getElementById('stat-total').textContent = people.length;
    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-approved').textContent = approved.length;
    renderPeopleList(people, 'people-list');
    renderPeopleList(pending, 'pending-list');
  } catch (e) {
    document.getElementById('people-list').innerHTML = `<div class="empty">Error: ${escHtml(e.message)}</div>`;
  }
}

function renderPeopleList(people, containerId) {
  const el = document.getElementById(containerId);
  if (!people.length) { el.innerHTML = '<div class="empty">None</div>'; return; }
  el.innerHTML = people.map(p => {
    const initials = (p.name || p.email || '?')[0].toUpperCase();
    const avatar = p.avatar
      ? `<img src="${escHtml(p.avatar)}" onerror="this.style.display='none'">`
      : initials;
    const projs = (p.projects || []).join(', ') || 'no projects';
    const groups = (p.groups || []).join(', ');
    return `
      <div class="person-row" onclick="openEdit('${escHtml(p.personId)}')">
        <div class="person-avatar">${avatar}</div>
        <div class="person-info">
          <div class="person-name">${escHtml(p.name || '—')}</div>
          <div class="person-email">${escHtml(p.email || '—')}</div>
          <div class="person-meta">${escHtml(projs)}${groups ? ' · ' + escHtml(groups) : ''}</div>
        </div>
        ${p.role === 'admin' ? '<span class="badge badge-admin">admin</span>' : ''}
        <span class="badge badge-${escHtml(p.status)}">${escHtml(p.status)}</span>
        <div class="actions" onclick="event.stopPropagation()">
          ${p.status !== 'approved' ? `<button class="btn btn-approve" onclick="quickStatus('${escHtml(p.personId)}','approved')">Approve</button>` : ''}
          ${p.status !== 'rejected' ? `<button class="btn btn-reject" onclick="quickStatus('${escHtml(p.personId)}','rejected')">Reject</button>` : ''}
        </div>
      </div>`;
  }).join('');
}

window.quickStatus = async (personId, status) => {
  try {
    await api(`/auth/people/${personId}`, { method: 'PATCH', body: { status } });
    await loadPeople();
  } catch (e) { alert(e.message); }
};

// Edit modal
let editPersonId = null;
let editState = { projects: [], groups: [], tags: [] };

window.openEdit = async (personId) => {
  editPersonId = personId;
  const overlay = document.getElementById('edit-overlay');
  overlay.classList.add('open');

  // Find person in allPeople first for quick fill, then fetch full detail
  const local = allPeople.find(p => p.personId === personId) || {};
  fillEditForm(local, []);

  try {
    const data = await api(`/auth/people/${personId}`);
    fillEditForm(data, data.identities || []);
  } catch (e) {
    document.getElementById('edit-msg').className = 'msg msg-err';
    document.getElementById('edit-msg').textContent = e.message;
  }
};

function fillEditForm(p, identities) {
  document.getElementById('edit-personId').value = p.personId || editPersonId;
  document.getElementById('edit-name').value = p.name || '';
  document.getElementById('edit-email').value = p.email || '';
  document.getElementById('edit-status').value = p.status || 'pending';
  document.getElementById('edit-role').value = p.role || 'user';

  tagState['edit-projects'] = [...(p.projects || [])];
  tagState['edit-groups'] = [...(p.groups || [])];
  tagState['edit-tags'] = [...(p.tags || [])];
  renderTagWrap('edit-projects');
  renderTagWrap('edit-groups');
  renderTagWrap('edit-tags');

  // Identities
  const idEl = document.getElementById('edit-identities');
  if (!identities.length) {
    idEl.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:4px 0">No linked identities</div>';
  } else {
    idEl.innerHTML = identities.map(id => `
      <div class="identity-row">
        <span class="identity-uid">${escHtml(id.uid)}</span>
        <span style="font-size:11px;color:var(--text-muted)">${escHtml(id.provider || '')}</span>
        <span style="font-size:11px;color:var(--text-muted)">${escHtml(id.email || '')}</span>
        <button class="btn btn-danger" onclick="unlinkIdentity('${escHtml(id.uid)}')" style="padding:3px 8px;font-size:11px">Unlink</button>
      </div>`).join('');
  }

  document.getElementById('edit-msg').textContent = '';
  document.getElementById('link-msg').textContent = '';
  document.getElementById('link-uid').value = '';
  document.getElementById('link-provider').value = '';
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('edit-overlay').classList.remove('open');
});
document.getElementById('edit-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('edit-overlay'))
    document.getElementById('edit-overlay').classList.remove('open');
});

document.getElementById('btn-modal-save').addEventListener('click', async () => {
  const pid = editPersonId;
  const body = {
    name: document.getElementById('edit-name').value.trim() || undefined,
    email: document.getElementById('edit-email').value.trim() || undefined,
    status: document.getElementById('edit-status').value,
    role: document.getElementById('edit-role').value,
    projects: tagState['edit-projects'],
    groups: tagState['edit-groups'],
    tags: tagState['edit-tags'],
  };
  const msg = document.getElementById('edit-msg');
  try {
    await api(`/auth/people/${pid}`, { method: 'PATCH', body });
    msg.className = 'msg msg-ok'; msg.textContent = 'Saved';
    await loadPeople();
  } catch (e) { msg.className = 'msg msg-err'; msg.textContent = e.message; }
});

document.getElementById('btn-modal-approve').addEventListener('click', async () => {
  document.getElementById('edit-status').value = 'approved';
  document.getElementById('btn-modal-save').click();
});
document.getElementById('btn-modal-reject').addEventListener('click', async () => {
  document.getElementById('edit-status').value = 'rejected';
  document.getElementById('btn-modal-save').click();
});

// Link identity
document.getElementById('btn-link-identity').addEventListener('click', async () => {
  const uid = document.getElementById('link-uid').value.trim();
  const provider = document.getElementById('link-provider').value.trim() || 'google.com';
  const msg = document.getElementById('link-msg');
  if (!uid) { msg.className = 'msg msg-err'; msg.textContent = 'UID is required'; return; }
  try {
    await api(`/auth/people/${editPersonId}/link`, { method: 'POST', body: { uid, provider } });
    msg.className = 'msg msg-ok'; msg.textContent = 'Identity linked';
    document.getElementById('link-uid').value = '';
    // Refresh identities
    const data = await api(`/auth/people/${editPersonId}`);
    fillEditForm(data, data.identities || []);
  } catch (e) { msg.className = 'msg msg-err'; msg.textContent = e.message; }
});

window.unlinkIdentity = async (uid) => {
  if (!confirm(`Unlink identity ${uid}?`)) return;
  const msg = document.getElementById('link-msg');
  try {
    await api(`/auth/people/${editPersonId}/identity/${uid}`, { method: 'DELETE' });
    msg.className = 'msg msg-ok'; msg.textContent = 'Identity unlinked';
    const data = await api(`/auth/people/${editPersonId}`);
    fillEditForm(data, data.identities || []);
  } catch (e) { msg.className = 'msg msg-err'; msg.textContent = e.message; }
};

// Create person
document.getElementById('btn-create-person').addEventListener('click', async () => {
  const name = document.getElementById('c-name').value.trim();
  const msg = document.getElementById('create-msg');
  msg.className = 'msg'; msg.textContent = '';
  if (!name) { msg.className = 'msg msg-err'; msg.textContent = 'Name is required'; return; }
  const btn = document.getElementById('btn-create-person');
  btn.disabled = true;
  try {
    const { personId } = await api('/auth/people', {
      method: 'POST',
      body: {
        name,
        email: document.getElementById('c-email').value.trim() || undefined,
        status: document.getElementById('c-status').value,
        role: document.getElementById('c-role').value,
        projects: tagState['c-projects'],
        groups: tagState['c-groups'],
      }
    });
    msg.className = 'msg msg-ok'; msg.textContent = `Person created (${personId})`;
    document.getElementById('c-name').value = '';
    document.getElementById('c-email').value = '';
    tagState['c-projects'] = []; renderTagWrap('c-projects');
    tagState['c-groups'] = []; renderTagWrap('c-groups');
    await loadPeople();
  } catch (e) { msg.className = 'msg msg-err'; msg.textContent = e.message; }
  btn.disabled = false;
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});

// Sign out
document.getElementById('btn-signout').addEventListener('click', async () => {
  await fetch(API + '/auth/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
  location.href = '/';
});

init();
</script>
</body>
</html>
