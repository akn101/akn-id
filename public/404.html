<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Not found — akn.id</title>
<link rel="icon" href="https://akn.me.uk/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100%; background: #0c0c14; color: rgba(255,255,255,0.85); font-family: system-ui, -apple-system, sans-serif; }
.blob { position: fixed; border-radius: 100px; filter: blur(80px); opacity: 0.15; z-index: 0; pointer-events: none; }
.blob-1 { background: linear-gradient(135deg,#667eea,#764ba2); top:5%; right:5%; width:380px; height:380px; animation: b1 20s ease-in-out infinite; }
.blob-2 { background: linear-gradient(135deg,#f093fb,#f5576c); bottom:10%; left:5%; width:300px; height:300px; animation: b2 18s ease-in-out infinite 3s; }
@keyframes b1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-25px)} }
@keyframes b2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }
.wordmark { position: fixed; top: 28px; left: 32px; display: flex; align-items: center; gap: 9px; text-decoration: none; z-index: 10; }
.wordmark img { width: 20px; height: 20px; opacity: 0.5; filter: invert(1); }
.wordmark span { font-size: 13px; color: rgba(255,255,255,0.32); letter-spacing: 0.05em; }
.page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
.code { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 6rem; font-weight: 300; color: rgba(255,255,255,0.08); line-height: 1; margin-bottom: 8px; }
h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.8rem; font-weight: 300; margin-bottom: 10px; }
p { font-size: 13px; color: rgba(255,255,255,0.32); margin-bottom: 28px; }
.btn { display: inline-block; background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); border-radius: 9px; padding: 10px 22px; font-size: 13px; text-decoration: none; transition: background 0.2s; }
.btn:hover { background: rgba(167,139,250,0.25); }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<a class="wordmark" href="/">
  <img src="https://akn.me.uk/android-chrome-192x192.png" alt="">
  <span>akn.id</span>
</a>
<div class="page">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist or has moved.</p>
  <a class="btn" href="/">Go home</a>
</div>
</body>
</html>
