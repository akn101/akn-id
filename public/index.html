<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>akn.id</title>
<link rel="icon" href="https://akn.me.uk/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0c14;
  --text: rgba(255,255,255,0.85);
  --text-muted: rgba(255,255,255,0.32);
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
  --input-bg: rgba(255,255,255,0.05);
  --input-border: rgba(255,255,255,0.1);
  --input-focus: rgba(167,139,250,0.45);
  --btn-bg: rgba(167,139,250,0.15);
  --btn-color: #a78bfa;
  --btn-border: rgba(167,139,250,0.3);
  --blob-op: 0.18;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
}

/* blobs */
.blob {
  position: fixed; border-radius: 100px;
  filter: blur(80px); opacity: var(--blob-op);
  z-index: 0; pointer-events: none;
}
.blob-1 { background: linear-gradient(135deg,#667eea,#764ba2); top:5%; right:5%; width:380px; height:380px; animation: b1 20s ease-in-out infinite; }
.blob-2 { background: linear-gradient(135deg,#f093fb,#f5576c); bottom:10%; left:5%; width:300px; height:300px; animation: b2 18s ease-in-out infinite 3s; }
@keyframes b1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-25px)} }
@keyframes b2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }

/* layout */
.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* wordmark */
.wordmark {
  position: fixed;
  top: 28px; left: 32px;
  display: flex; align-items: center; gap: 9px;
  text-decoration: none; z-index: 10;
}
.wordmark img {
  width: 22px; height: 22px;
  opacity: 0.7;
  filter: invert(1);
}
.wordmark span {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 15px; font-weight: 300;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

/* card */
.card {
  width: 100%; max-width: 340px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  padding: 32px 28px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.card-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.5rem; font-weight: 300;
  color: var(--text); margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.card-title em { font-style: italic; }

.card-sub {
  font-size: 12px; color: var(--text-muted);
  margin-bottom: 24px; letter-spacing: 0.02em;
}

/* form */
.field { margin-bottom: 12px; }

input[type="email"],
input[type="password"] {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 9px;
  padding: 10px 13px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
input[type="email"]:focus,
input[type="password"]:focus {
  border-color: var(--input-focus);
}
input::placeholder { color: var(--text-muted); }

.btn {
  width: 100%;
  background: var(--btn-bg);
  color: var(--btn-color);
  border: 1px solid var(--btn-border);
  border-radius: 9px;
  padding: 10px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  margin-top: 4px;
  transition: background 0.2s;
  letter-spacing: 0.02em;
}
.btn:hover { background: rgba(167,139,250,0.25); }
.btn:disabled { opacity: 0.4; cursor: default; }

.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0; color: var(--text-muted); font-size: 11px;
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  height: 1px; background: var(--card-border);
}

.btn-google {
  width: 100%;
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.6);
  border: 1px solid var(--card-border);
  border-radius: 9px;
  padding: 10px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.2s;
}
.btn-google:hover { background: rgba(255,255,255,0.07); }

.toggle {
  text-align: center; margin-top: 18px;
  font-size: 12px; color: var(--text-muted);
}
.toggle a {
  color: var(--btn-color); text-decoration: none;
  cursor: pointer;
}
.toggle a:hover { text-decoration: underline; }

.error-msg {
  font-size: 12px; color: #fca5a5;
  margin-top: 10px; text-align: center;
  min-height: 16px;
}

/* redirect state */
.redirect {
  text-align: center;
}
.redirect p {
  font-size: 13px; color: var(--text-muted);
  margin-top: 12px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--card-border);
  border-top-color: var(--btn-color);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* footer */
.footer {
  position: fixed; bottom: 20px;
  font-size: 11px; color: rgba(255,255,255,0.15);
  letter-spacing: 0.03em;
}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<a class="wordmark" href="https://akn.me.uk">
  <img src="https://akn.me.uk/android-chrome-192x192.png" alt="">
  <span>akn.id</span>
</a>

<div class="page">
  <div class="card" id="card">

    <!-- Sign in view -->
    <div id="view-signin">
      <div class="card-title">Welcome <em>back</em></div>
      <div class="card-sub">sign in to continue</div>

      <div class="field">
        <input type="email" id="email" placeholder="email" autocomplete="email" />
      </div>
      <div class="field">
        <input type="password" id="password" placeholder="password" autocomplete="current-password" />
      </div>
      <button class="btn" id="btn-signin">sign in</button>

      <div class="divider">or</div>

      <button class="btn-google" id="btn-google">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        continue with Google
      </button>

      <div class="error-msg" id="signin-error"></div>

      <div class="toggle">
        no account? <a id="link-to-signup">sign up</a>
      </div>
    </div>

    <!-- Sign up view -->
    <div id="view-signup" style="display:none">
      <div class="card-title">Create an <em>account</em></div>
      <div class="card-sub">join akn.id</div>

      <div class="field">
        <input type="email" id="signup-email" placeholder="email" autocomplete="email" />
      </div>
      <div class="field">
        <input type="password" id="signup-password" placeholder="password (min 8 chars)" autocomplete="new-password" />
      </div>
      <button class="btn" id="btn-signup">create account</button>

      <div class="error-msg" id="signup-error"></div>

      <div class="toggle">
        already have one? <a id="link-to-signin">sign in</a>
      </div>
    </div>

    <!-- Signed in / redirect view -->
    <div id="view-redirect" style="display:none" class="redirect">
      <div class="spinner"></div>
      <p>signed in — redirecting…</p>
    </div>

  </div>
</div>

<div class="footer">akn.id</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
} from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';

const app = initializeApp({
  apiKey: "AIzaSyDLWVxNsZveffKUaf07mRlrlouM_gyocmI",
  authDomain: "aknid-me-uk.firebaseapp.com",
  projectId: "aknid-me-uk",
  storageBucket: "aknid-me-uk.firebasestorage.app",
  messagingSenderId: "903162243588",
  appId: "1:903162243588:web:053d5c3a06c0fb23ee6351",
});
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Check for redirect param
const params = new URLSearchParams(location.search);
const redirectTo = params.get('redirect') || null;

function showView(name) {
  ['signin', 'signup', 'redirect'].forEach(v => {
    document.getElementById(`view-${v}`).style.display = v === name ? '' : 'none';
  });
}

function setError(id, msg) {
  document.getElementById(id).textContent = msg;
}

// If already signed in, redirect
onAuthStateChanged(auth, async user => {
  if (user) {
    showView('redirect');
    if (redirectTo) {
      const token = await user.getIdToken();
      const url = new URL(redirectTo);
      url.searchParams.set('token', token);
      location.href = url.toString();
    }
  }
});

// Sign in
document.getElementById('btn-signin').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  setError('signin-error', '');
  if (!email || !password) return setError('signin-error', 'fill in both fields');
  const btn = document.getElementById('btn-signin');
  btn.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    btn.disabled = false;
    setError('signin-error', friendlyError(e.code));
  }
});

// Sign up
document.getElementById('btn-signup').addEventListener('click', async () => {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  setError('signup-error', '');
  if (!email || !password) return setError('signup-error', 'fill in both fields');
  if (password.length < 8) return setError('signup-error', 'password must be at least 8 characters');
  const btn = document.getElementById('btn-signup');
  btn.disabled = true;
  try {
    await createUserWithEmailAndPassword(auth, email, password);
  } catch (e) {
    btn.disabled = false;
    setError('signup-error', friendlyError(e.code));
  }
});

// Google
document.getElementById('btn-google').addEventListener('click', async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    setError('signin-error', friendlyError(e.code));
  }
});

// Toggle views
document.getElementById('link-to-signup').addEventListener('click', () => showView('signup'));
document.getElementById('link-to-signin').addEventListener('click', () => showView('signin'));

// Enter key
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-signin').click();
});
document.getElementById('signup-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-signup').click();
});

function friendlyError(code) {
  const map = {
    'auth/invalid-email': 'invalid email address',
    'auth/user-not-found': 'no account with that email',
    'auth/wrong-password': 'incorrect password',
    'auth/invalid-credential': 'incorrect email or password',
    'auth/email-already-in-use': 'an account with that email already exists',
    'auth/weak-password': 'password is too weak',
    'auth/too-many-requests': 'too many attempts — try again later',
    'auth/popup-closed-by-user': '',
  };
  return map[code] || 'something went wrong';
}
</script>
</body>
</html>
